<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,
      initial-scale=1.0, maximum-scale=1.0,
      user-scalable=no, orientation=landscape">
<title>旅途</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    width:100vw; height:100vh;
    overflow:hidden;
    touch-action:none;
  }
  canvas {
    display:block;
    max-width:100vw;
    max-height:100vh;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/* =====================================================
   全局设置
   ===================================================== */
const W = 1280, H = 720;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

/* 自适应缩放 */
function resize(){
  const sr = Math.min(window.innerWidth/W, window.innerHeight/H);
  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = (W*sr)+'px';
  canvas.style.height = (H*sr)+'px';
}
resize();
window.addEventListener('resize', resize);

/* =====================================================
   状态管理
   ===================================================== */
const SCENES = ['grass','snow','maple','beach','river','sunset'];
let sceneIdx   = 0;          // 当前场景索引
let manX       = 130;        // 小人X
let manTargetX = W*0.72;     // 小人目标X
let sceneDone  = false;      // 小人是否走到位
let state      = 'journey';  // journey / birthday1 / birthday2
let elapsed    = 0;          // 场景内累计时间
let globalT    = 0;          // 全局时间

/* 场景过渡 */
let transAlpha   = 1.0;      // 0=透明 1=黑色
let transState   = 'in';     // 'in'淡入 'out'淡出 'none'
let pendingScene = -1;

/* 生日画面 */
let bdayTime     = 0;
let bdayParticles= [];
let fireworks    = [];

/* =====================================================
   音乐系统
   ===================================================== */
const MUSIC_FILES = {
  grass : 'music/grass.mp3',
  snow  : 'music/snow.mp3',
  maple : 'music/maple.mp3',
  beach : 'music/beach.mp3',
  river : 'music/river.mp3',
  sunset: 'music/sunset.mp3',
};
let audios = {};
let currentAudio = null;

function loadAudios(){
  for(let k in MUSIC_FILES){
    let a = new Audio(MUSIC_FILES[k]);
    a.loop = true;
    a.volume = 0.5;
    audios[k] = a;
  }
}

function playMusic(name){
  if(currentAudio){
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  if(!name || !audios[name]) return;
  currentAudio = audios[name];
  currentAudio.play().catch(()=>{});
}

function stopMusic(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
}

/* =====================================================
   数学工具
   ===================================================== */
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function rand(a,b){ return a+Math.random()*(b-a); }
function hsv(h,s,v){
  let r,g,b;
  let i=Math.floor(h*6)%6;
  let f=h*6-Math.floor(h*6);
  let p=v*(1-s),q=v*(1-f*s),tv=v*(1-(1-f)*s);
  [r,g,b]=[[v,tv,p],[q,v,p],[p,v,tv],[p,q,v],[tv,p,v],[v,p,q]][i];
  return `rgb(${(r*255)|0},${(g*255)|0},${(b*255)|0})`;
}

/* =====================================================
   光遇风格小人绘制
   ===================================================== */
function drawSkyKid(x, y, t, mode){
  // mode: 'walk' | 'climb' | 'swim' | 'sit'
  ctx.save();
  ctx.translate(x, y);

  const scale = 1.0;

  // 整体发光效果
  ctx.shadowColor = 'rgba(255,230,150,0.85)';
  ctx.shadowBlur  = 22;

  // 走路动画参数
  let legSwing   = 0, armSwing = 0, bodyBob = 0;
  if(mode === 'walk'){
    legSwing = Math.sin(t*5.5)*18;
    armSwing = Math.sin(t*5.5)*14;
    bodyBob  = Math.abs(Math.sin(t*5.5))*3;
  } else if(mode === 'climb'){
    legSwing = Math.sin(t*3.5)*20;
    armSwing = Math.sin(t*3.5+Math.PI)*22;
    bodyBob  = 0;
  }

  if(mode === 'swim'){
    _drawSwim(t);
    ctx.restore();
    return;
  }
  if(mode === 'sit'){
    _drawSit(t);
    ctx.restore();
    return;
  }

  // ---- 披风 ----
  _drawCloak(t, legSwing, bodyBob);

  // ---- 腿 ----
  ctx.strokeStyle = 'rgba(255,240,200,0.9)';
  ctx.lineWidth   = 5;
  ctx.lineCap     = 'round';
  // 左腿
  ctx.save();
  ctx.rotate((-legSwing)*Math.PI/180);
  ctx.beginPath();
  ctx.moveTo(-5, 8+bodyBob);
  ctx.lineTo(-6, 30+bodyBob);
  ctx.stroke();
  ctx.restore();
  // 右腿
  ctx.save();
  ctx.rotate((legSwing)*Math.PI/180);
  ctx.beginPath();
  ctx.moveTo(5, 8+bodyBob);
  ctx.lineTo(6, 30+bodyBob);
  ctx.stroke();
  ctx.restore();

  // ---- 身体 ----
  let bodyGrad = ctx.createRadialGradient(0,-10,2,0,-10,22);
  bodyGrad.addColorStop(0,'rgba(255,248,220,1)');
  bodyGrad.addColorStop(0.6,'rgba(255,220,140,0.95)');
  bodyGrad.addColorStop(1,'rgba(200,160,80,0.7)');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, -5+bodyBob, 13, 18, 0, 0, Math.PI*2);
  ctx.fill();

  // ---- 手臂 ----
  ctx.strokeStyle = 'rgba(255,240,200,0.9)';
  ctx.lineWidth   = 4;
  // 左臂
  ctx.save();
  ctx.rotate((-armSwing-15)*Math.PI/180);
  ctx.beginPath();
  ctx.moveTo(-12, -8+bodyBob);
  ctx.quadraticCurveTo(-22, -2+bodyBob, -20, 12+bodyBob);
  ctx.stroke();
  ctx.restore();
  // 右臂
  ctx.save();
  ctx.rotate((armSwing+15)*Math.PI/180);
  ctx.beginPath();
  ctx.moveTo(12, -8+bodyBob);
  ctx.quadraticCurveTo(22, -2+bodyBob, 20, 12+bodyBob);
  ctx.stroke();
  ctx.restore();

  // ---- 头 ----
  _drawHead(bodyBob);

  // ---- 头发光晕 ----
  let hairGlow = ctx.createRadialGradient(0,-32+bodyBob,2,0,-32+bodyBob,18);
  hairGlow.addColorStop(0,'rgba(255,240,180,0.9)');
  hairGlow.addColorStop(0.5,'rgba(255,200,80,0.5)');
  hairGlow.addColorStop(1,'rgba(255,180,50,0)');
  ctx.fillStyle = hairGlow;
  ctx.beginPath();
  ctx.arc(0,-32+bodyBob,18,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function _drawHead(bob){
  bob = bob||0;
  // 脸
  let faceGrad = ctx.createRadialGradient(0,-32+bob,2,0,-32+bob,14);
  faceGrad.addColorStop(0,'rgba(255,248,225,1)');
  faceGrad.addColorStop(0.7,'rgba(255,220,160,0.95)');
  faceGrad.addColorStop(1,'rgba(220,180,100,0.8)');
  ctx.fillStyle = faceGrad;
  ctx.beginPath();
  ctx.arc(0,-32+bob,13,0,Math.PI*2);
  ctx.fill();

  // 眼睛（光遇大眼睛）
  ctx.fillStyle = 'rgba(60,40,20,0.9)';
  ctx.beginPath();
  ctx.ellipse(-4.5,-32+bob,3.5,4,0,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(4.5,-32+bob,3.5,4,0,0,Math.PI*2);
  ctx.fill();
  // 眼睛高光
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.arc(-3.5,-33.5+bob,1.5,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(5.5,-33.5+bob,1.5,0,Math.PI*2);
  ctx.fill();

  // 头发（光遇蓬松发型）
  ctx.fillStyle = 'rgba(60,35,10,0.9)';
  ctx.beginPath();
  ctx.ellipse(0,-42+bob,10,7,0,0,Math.PI);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-8,-38+bob,6,5,-0.4,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8,-38+bob,6,5,0.4,0,Math.PI*2);
  ctx.fill();
}

function _drawCloak(t, legSwing, bob){
  bob = bob||0;
  // 披风主体（会随动作飘动）
  let cloakWave = Math.sin(t*2)*6 + legSwing*0.3;
  let grad = ctx.createLinearGradient(0,-15,0,45);
  grad.addColorStop(0,'rgba(255,250,235,0.95)');
  grad.addColorStop(0.4,'rgba(245,235,200,0.9)');
  grad.addColorStop(0.8,'rgba(230,210,160,0.85)');
  grad.addColorStop(1,'rgba(200,180,120,0.5)');

  ctx.fillStyle = grad;
  ctx.shadowColor = 'rgba(255,220,100,0.6)';
  ctx.shadowBlur  = 15;

  ctx.beginPath();
  ctx.moveTo(-14, -15+bob);
  ctx.quadraticCurveTo(-20, 10+bob, -18+cloakWave, 42+bob);
  ctx.quadraticCurveTo(-8, 50+bob, 0, 48+bob);
  ctx.quadraticCurveTo(8, 50+bob, 18-cloakWave, 42+bob);
  ctx.quadraticCurveTo(20, 10+bob, 14, -15+bob);
  ctx.closePath();
  ctx.fill();

  // 披风边缘光
  ctx.strokeStyle = 'rgba(255,240,180,0.7)';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // 披风折痕
  ctx.strokeStyle = 'rgba(200,170,100,0.4)';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(-5,-10+bob);
  ctx.quadraticCurveTo(-8,15+bob,-6+cloakWave*0.5,40+bob);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(5,-10+bob);
  ctx.quadraticCurveTo(8,15+bob,6-cloakWave*0.5,40+bob);
  ctx.stroke();
}

function _drawSwim(t){
  ctx.save();
  ctx.rotate(-0.35);
  // 身体水平
  let bodyGrad = ctx.createRadialGradient(15,0,2,15,0,22);
  bodyGrad.addColorStop(0,'rgba(255,248,220,1)');
  bodyGrad.addColorStop(1,'rgba(200,160,80,0.7)');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(15, 0, 22, 12, 0, 0, Math.PI*2);
  ctx.fill();

  // 披风（水中飘动）
  let waveC = Math.sin(t*4)*8;
  let cg = ctx.createLinearGradient(0,0,40,0);
  cg.addColorStop(0,'rgba(255,250,235,0.9)');
  cg.addColorStop(1,'rgba(200,180,120,0.4)');
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.moveTo(0,-8);
  ctx.quadraticCurveTo(20,-15+waveC,40,-8+waveC);
  ctx.quadraticCurveTo(42,0,40,8-waveC);
  ctx.quadraticCurveTo(20,15-waveC,0,8);
  ctx.closePath();
  ctx.fill();

  // 头
  ctx.translate(-10, 0);
  _drawHead(0);

  // 手臂划水
  let stroke = Math.sin(t*3)*20;
  ctx.strokeStyle = 'rgba(255,240,200,0.9)';
  ctx.lineWidth   = 4;
  ctx.beginPath();
  ctx.moveTo(10,-5);
  ctx.quadraticCurveTo(5,-15,-5+stroke,-20);
  ctx.stroke();

  // 腿打水
  let kick = Math.sin(t*6)*10;
  ctx.translate(10,0);
  ctx.strokeStyle = 'rgba(255,240,200,0.9)';
  ctx.lineWidth   = 4;
  ctx.beginPath();
  ctx.moveTo(28,3);
  ctx.lineTo(44,3+kick);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(28,3);
  ctx.lineTo(44,3-kick);
  ctx.stroke();

  ctx.restore();
}

function _drawSit(t){
  // 披风
  let cg = ctx.createLinearGradient(0,-15,0,30);
  cg.addColorStop(0,'rgba(255,250,235,0.95)');
  cg.addColorStop(1,'rgba(200,180,120,0.5)');
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.moveTo(-14,-15);
  ctx.quadraticCurveTo(-18,5,-10,28);
  ctx.quadraticCurveTo(0,32,10,28);
  ctx.quadraticCurveTo(18,5,14,-15);
  ctx.closePath();
  ctx.fill();

  // 腿（水平弯曲）
  ctx.strokeStyle = 'rgba(255,240,200,0.9)';
  ctx.lineWidth   = 5;
  ctx.beginPath();
  ctx.moveTo(-8,12);
  ctx.quadraticCurveTo(10,18,26,12);
  ctx.quadraticCurveTo(28,20,26,28);
  ctx.stroke();

  // 身体
  let bg = ctx.createRadialGradient(0,-5,2,0,-5,18);
  bg.addColorStop(0,'rgba(255,248,220,1)');
  bg.addColorStop(1,'rgba(200,160,80,0.7)');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.ellipse(0,-5,12,16,0,0,Math.PI*2);
  ctx.fill();

  // 手臂（撑着看）
  ctx.strokeStyle = 'rgba(255,240,200,0.9)';
  ctx.lineWidth   = 4;
  ctx.beginPath();
  ctx.moveTo(-12,-5);
  ctx.quadraticCurveTo(-20,5,-18,18);
  ctx.stroke();

  // 头
  _drawHead(0);

  // 随风飘动的披风尾
  let wave = Math.sin(t*1.5)*5;
  let cg2 = ctx.createLinearGradient(0,20,40,30);
  cg2.addColorStop(0,'rgba(255,240,200,0.5)');
  cg2.addColorStop(1,'rgba(200,180,120,0)');
  ctx.fillStyle = cg2;
  ctx.beginPath();
  ctx.moveTo(10,20);
  ctx.quadraticCurveTo(25,25+wave,42,22+wave);
  ctx.quadraticCurveTo(43,28,42,32+wave);
  ctx.quadraticCurveTo(25,32-wave,10,28);
  ctx.closePath();
  ctx.fill();
}

/* =====================================================
   场景1：草地
   ===================================================== */
function drawGrass(t, mx){
  // 天空渐变
  let skyG = ctx.createLinearGradient(0,0,0,H);
  skyG.addColorStop(0,'#7EC8E3');
  skyG.addColorStop(0.5,'#B5E4F5');
  skyG.addColorStop(1,'#D4F1C8');
  ctx.fillStyle = skyG;
  ctx.fillRect(0,0,W,H);

  // 太阳
  let sunG = ctx.createRadialGradient(W-150,100,10,W-150,100,80);
  sunG.addColorStop(0,'rgba(255,250,200,1)');
  sunG.addColorStop(0.4,'rgba(255,230,80,0.8)');
  sunG.addColorStop(1,'rgba(255,200,50,0)');
  ctx.fillStyle = sunG;
  ctx.beginPath();
  ctx.arc(W-150,100,80,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,248,180,0.95)';
  ctx.beginPath();
  ctx.arc(W-150,100,40,0,Math.PI*2);
  ctx.fill();

  // 光芒
  ctx.save();
  ctx.translate(W-150,100);
  for(let i=0;i<12;i++){
    let a = i/12*Math.PI*2 + t*0.3;
    ctx.strokeStyle = 'rgba(255,240,120,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*48,Math.sin(a)*48);
    ctx.lineTo(Math.cos(a)*80,Math.sin(a)*80);
    ctx.stroke();
  }
  ctx.restore();

  // 远山
  for(let layer=0;layer<3;layer++){
    let alpha = 0.3+layer*0.2;
    let g = 140-layer*20;
    ctx.fillStyle = `rgba(80,${g},80,${alpha})`;
    ctx.beginPath();
    ctx.moveTo(0,H*0.55);
    for(let x=0;x<=W;x+=20){
      let hy = H*0.55 - (Math.sin(x/120+layer*2)*60 +
               Math.sin(x/55+layer)*25 + layer*30);
      ctx.lineTo(x,hy);
    }
    ctx.lineTo(W,H*0.55);
    ctx.closePath();
    ctx.fill();
  }

  // 草地
  let groundG = ctx.createLinearGradient(0,H*0.55,0,H);
  groundG.addColorStop(0,'#5DBB4A');
  groundG.addColorStop(0.3,'#4CAF40');
  groundG.addColorStop(1,'#2E7D22');
  ctx.fillStyle = groundG;
  ctx.beginPath();
  ctx.moveTo(0,H*0.55);
  for(let x=0;x<=W;x+=15){
    let wy = H*0.55 + Math.sin(x/80)*8 + Math.sin(x/35)*4;
    ctx.lineTo(x,wy);
  }
  ctx.lineTo(W,H);
  ctx.lineTo(0,H);
  ctx.closePath();
  ctx.fill();

  // 路径（小路）
  ctx.fillStyle = 'rgba(180,150,80,0.5)';
  ctx.beginPath();
  ctx.moveTo(0,H*0.62);
  ctx.quadraticCurveTo(W*0.4,H*0.60,W,H*0.63);
  ctx.lineTo(W,H*0.67);
  ctx.quadraticCurveTo(W*0.4,H*0.64,0,H*0.66);
  ctx.closePath();
  ctx.fill();

  // 云朵
  let clouds=[{x:200,y:80},{x:550,y:55},{x:900,y:75}];
  clouds.forEach((c,i)=>{
    let cx2 = c.x + Math.sin(t*0.3+i*2.1)*25;
    let cy2 = c.y + Math.sin(t*0.2+i)*6;
    drawCloud(cx2,cy2,1.0,1.0);
  });

  // 远景树
  for(let i=0;i<6;i++){
    let tx = 80+i*210;
    let ty = H*0.56;
    drawTree(tx,ty,0.7+i%2*0.15,t);
  }

  // 草丛（前景）
  for(let i=0;i<40;i++){
    let gx = i*33+10;
    let gy = H*0.57 + Math.sin(gx/80)*8;
    drawGrassTuft(gx,gy,t,i);
  }

  // 野花
  let flowerC=['#FF6B9D','#FFD93D','#C77DFF','#FF9F43'];
  for(let i=0;i<18;i++){
    let fx = 40+i*72;
    let fy = H*0.59+i%3*12;
    ctx.fillStyle = flowerC[i%4];
    ctx.beginPath();
    ctx.arc(fx,fy,5,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,200,0.9)';
    ctx.beginPath();
    ctx.arc(fx,fy,2.5,0,Math.PI*2);
    ctx.fill();
  }

  // 蝴蝶
  for(let i=0;i<4;i++){
    let bx = 150+i*280 + Math.sin(t*0.8+i*1.5)*40;
    let by = H*0.45 + Math.sin(t*1.2+i*0.8)*30;
    drawButterfly(bx,by,t+i);
  }

  // 鸟
  drawBirds(t,0.6);

  // 地面装饰（前景草）
  for(let i=0;i<25;i++){
    let gx2 = i*52+15;
    let gy2 = H*0.64 + i%3*8;
    drawGrassTuft(gx2,gy2,t,i+5);
  }

  let groundY = H*0.62;
  drawSkyKid(mx, groundY, t, 'walk');
}

/* =====================================================
   场景2：雪山
   ===================================================== */
let snowflakes = [];
function initSnow(){
  snowflakes = [];
  for(let i=0;i<120;i++){
    snowflakes.push({
      x:rand(0,W), y:rand(0,H),
      r:rand(1.5,4), speed:rand(0.5,1.8),
      drift:rand(-0.3,0.3), phase:rand(0,Math.PI*2)
    });
  }
}
initSnow();

function drawSnow(t, mx){
  // 天空（清晨薄雾蓝灰）
  let skyG = ctx.createLinearGradient(0,0,0,H);
  skyG.addColorStop(0,'#B8CDE8');
  skyG.addColorStop(0.4,'#D5E8F5');
  skyG.addColorStop(1,'#EEF5FA');
  ctx.fillStyle = skyG;
  ctx.fillRect(0,0,W,H);

  // 薄雾
  let fogG = ctx.createLinearGradient(0,H*0.3,0,H*0.7);
  fogG.addColorStop(0,'rgba(255,255,255,0)');
  fogG.addColorStop(0.5,'rgba(255,255,255,0.25)');
  fogG.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = fogG;
  ctx.fillRect(0,0,W,H);

  // 远山（蓝灰）
  [0.18,0.12,0.08].forEach((alpha,i)=>{
    ctx.fillStyle = `rgba(160,185,210,${0.5+i*0.2})`;
    ctx.beginPath();
    ctx.moveTo(0,H);
    let peaks=[
      [0,H*0.65],[W*0.15,H*0.28],[W*0.35,H*0.45],
      [W*0.5,H*0.18],[W*0.65,H*0.38],[W*0.82,H*0.22],
      [W,H*0.42],[W,H]
    ];
    peaks.forEach(p=>ctx.lineTo(p[0]-i*60,p[1]+i*20));
    ctx.closePath();
    ctx.fill();
  });

  // 雪山主峰
  ctx.fillStyle = '#D8E8F5';
  ctx.beginPath();
  ctx.moveTo(0,H);
  ctx.lineTo(W*0.1,H*0.55);
  ctx.lineTo(W*0.25,H*0.72);
  ctx.lineTo(W*0.4,H*0.38);
  ctx.lineTo(W*0.55,H*0.62);
  ctx.lineTo(W*0.7,H*0.30);
  ctx.lineTo(W*0.85,H*0.55);
  ctx.lineTo(W,H*0.48);
  ctx.lineTo(W,H);
  ctx.closePath();
  ctx.fill();

  // 积雪顶部（纯白）
  let snowPeaks=[
    {px:W*0.4,py:H*0.38,w:0.12},
    {px:W*0.7,py:H*0.30,w:0.1},
    {px:W*0.85,py:H*0.55,w:0.08}
  ];
  snowPeaks.forEach(p=>{
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.moveTo(p.px,p.py);
    ctx.lineTo(p.px-W*p.w,p.py+H*0.12);
    ctx.lineTo(p.px+W*p.w,p.py+H*0.12);
    ctx.closePath();
    ctx.fill();
    // 雪光
    let sg = ctx.createRadialGradient(p.px,p.py+20,5,p.px,p.py+20,W*p.w*1.2);
    sg.addColorStop(0,'rgba(255,255,255,0.7)');
    sg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.moveTo(p.px,p.py);
    ctx.lineTo(p.px-W*p.w*1.2,p.py+H*0.14);
    ctx.lineTo(p.px+W*p.w*1.2,p.py+H*0.14);
    ctx.closePath();
    ctx.fill();
  });

  // 雪地
  let groundG = ctx.createLinearGradient(0,H*0.62,0,H);
  groundG.addColorStop(0,'#EEF5FA');
  groundG.addColorStop(0.3,'#E0EEF8');
  groundG.addColorStop(1,'#C8DFF0');
  ctx.fillStyle = groundG;
  ctx.beginPath();
  ctx.moveTo(0,H*0.62);
  for(let x=0;x<=W;x+=20){
    let wy = H*0.62 + Math.sin(x/90)*10+Math.sin(x/40)*4;
    ctx.lineTo(x,wy);
  }
  ctx.lineTo(W,H);
  ctx.lineTo(0,H);
  ctx.closePath();
  ctx.fill();

  // 雪地阴影/层次
  ctx.fillStyle = 'rgba(160,200,230,0.3)';
  ctx.beginPath();
  ctx.moveTo(0,H*0.65);
  for(let x=0;x<=W;x+=20){
    let wy = H*0.65+Math.sin(x/70+1)*8;
    ctx.lineTo(x,wy);
  }
  ctx.lineTo(W,H*0.7);
  ctx.lineTo(0,H*0.7);
  ctx.closePath();
  ctx.fill();

  // 松树（雪覆盖）
  [80,250,450,700,950,1150].forEach((tx,i)=>{
    drawSnowTree(tx, H*0.63+i%2*15, 0.7+i%3*0.15, t);
  });

  // 雪道（踩出的路）
  ctx.strokeStyle='rgba(180,210,240,0.5)';
  ctx.lineWidth=18;
  ctx.beginPath();
  ctx.moveTo(0,H*0.66);
  ctx.quadraticCurveTo(W*0.5,H*0.64,W,H*0.67);
  ctx.stroke();

  // 更新&绘制雪花
  snowflakes.forEach(sf=>{
    sf.y += sf.speed;
    sf.x += sf.drift + Math.sin(t*0.5+sf.phase)*0.3;
    if(sf.y>H){ sf.y=-5; sf.x=rand(0,W); }
    if(sf.x>W) sf.x=0;
    if(sf.x<0) sf.x=W;
    ctx.fillStyle = `rgba(255,255,255,${0.5+sf.r/6})`;
    ctx.shadowColor = 'rgba(200,230,255,0.8)';
    ctx.shadowBlur  = 4;
    ctx.beginPath();
    ctx.arc(sf.x,sf.y,sf.r,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
  });

  let groundY = H*0.63;
  drawSkyKid(mx, groundY, t, 'climb');

  draw_txt_scene('攀越雪山','rgba(180,210,240,0.9)');
}

/* =====================================================
   场景3：枫叶林
   ===================================================== */
let fallingLeaves=[];
function initLeaves(){
  fallingLeaves=[];
  for(let i=0;i<50;i++){
    fallingLeaves.push({
      x:rand(0,W), y:rand(0,H),
      r:rand(4,8), speed:rand(0.8,2.0),
      drift:rand(-1,1), spin:rand(0,Math.PI*2),
      spinSpeed:rand(-0.05,0.05),
      color:['#FF4500','#FF6B00','#FF8C00','#FFD700',
             '#CC2200','#E85D04'][Math.floor(rand(0,6))]
    });
  }
}
initLeaves();

function drawMaple(t, mx){
  // 天空（秋日金橙）
  let skyG = ctx.createLinearGradient(0,0,0,H);
  skyG.addColorStop(0,'#2D1B00');
  skyG.addColorStop(0.2,'#8B3A00');
  skyG.addColorStop(0.5,'#E06010');
  skyG.addColorStop(0.8,'#F0A030');
  skyG.addColorStop(1,'#D4701A');
  ctx.fillStyle = skyG;
  ctx.fillRect(0,0,W,H);

  // 太阳（低斜阳）
  let sunG = ctx.createRadialGradient(W*0.15,H*0.35,5,W*0.15,H*0.35,120);
  sunG.addColorStop(0,'rgba(255,200,50,1)');
  sunG.addColorStop(0.3,'rgba(255,150,20,0.7)');
  sunG.addColorStop(1,'rgba(255,100,0,0)');
  ctx.fillStyle = sunG;
  ctx.beginPath();
  ctx.arc(W*0.15,H*0.35,120,0,Math.PI*2);
  ctx.fill();

  // 远景枫树（剪影）
  for(let i=0;i<8;i++){
    let tx = i*180-30;
    let th = 180+i%3*60;
    ctx.fillStyle = `rgba(${80+i*10},${20+i*3},0,0.6)`;
    ctx.beginPath();
    ctx.moveTo(tx,H*0.62);
    ctx.lineTo(tx+8,H*0.62-th);
    ctx.lineTo(tx+16,H*0.62);
    ctx.closePath();
    ctx.fill();
    // 树冠
    ctx.fillStyle = `rgba(${160+i*8},${40+i*5},0,0.5)`;
    ctx.beginPath();
    ctx.arc(tx+8,H*0.62-th,50+i%3*15,0,Math.PI*2);
    ctx.fill();
    ctx.arc(tx-15,H*0.62-th+20,35+i%2*10,0,Math.PI*2);
    ctx.fill();
    ctx.arc(tx+30,H*0.62-th+15,38+i%2*12,0,Math.PI*2);
    ctx.fill();
  }

  // 地面
  let groundG = ctx.createLinearGradient(0,H*0.62,0,H);
  groundG.addColorStop(0,'#5C2000');
  groundG.addColorStop(0.3,'#4A1800');
  groundG.addColorStop(1,'#2A0C00');
  ctx.fillStyle = groundG;
  ctx.beginPath();
  ctx.moveTo(0,H*0.62);
  for(let x=0;x<=W;x+=20){
    let wy=H*0.62+Math.sin(x/80)*6;
    ctx.lineTo(x,wy);
  }
  ctx.lineTo(W,H);
  ctx.lineTo(0,H);
  ctx.closePath();
  ctx.fill();

  // 落叶铺地
  for(let i=0;i<30;i++){
    let lx=i*44+20, ly=H*0.64+i%4*8;
    ctx.fillStyle=['#CC3300','#FF5500','#FF8C00'][i%3];
    ctx.save();
    ctx.translate(lx,ly);
    ctx.rotate(i*0.5);
    drawLeafShape(5+i%3*2);
    ctx.restore();
  }

  // 近景枫树（详细）
  [50,320,620,900,1180].forEach((tx,i)=>{
    drawMapleTree(tx, H*0.63, 0.8+i%2*0.2, t, i);
  });

  // 光束（透过树叶）
  ctx.save();
  for(let i=0;i<5;i++){
    let lbx = W*0.1+i*W*0.2;
    let lg = ctx.createLinearGradient(lbx,0,lbx+80,H*0.65);
    lg.addColorStop(0,'rgba(255,200,80,0.08)');
    lg.addColorStop(1,'rgba(255,180,50,0)');
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.moveTo(lbx,0);
    ctx.lineTo(lbx+60,H*0.65);
    ctx.lineTo(lbx+80,H*0.65);
    ctx.lineTo(lbx+20,0);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  // 落叶动画
  fallingLeaves.forEach(lf=>{
    lf.y += lf.speed;
    lf.x += lf.drift + Math.sin(lf.spin)*0.8;
    lf.spin += lf.spinSpeed;
    if(lf.y>H){ lf.y=-10; lf.x=rand(0,W); }
    ctx.save();
    ctx.translate(lf.x,lf.y);
    ctx.rotate(lf.spin);
    ctx.fillStyle = lf.color;
    drawLeafShape(lf.r);
    ctx.restore();
  });

  let groundY = H*0.63;
  drawSkyKid(mx, groundY, t, 'walk');

  draw_txt_scene('穿越枫叶林','rgba(255,200,100,0.9)');
}

/* =====================================================
   场景4：沙滩
   ===================================================== */
function drawBeach(t, mx){
  // 天空
  let skyG = ctx.createLinearGradient(0,0,0,H);
  skyG.addColorStop(0,'#1A6FAF');
  skyG.addColorStop(0.4,'#4DA6E8');
  skyG.addColorStop(0.7,'#87CEEB');
  skyG.addColorStop(1,'#B0E0FF');
  ctx.fillStyle = skyG;
  ctx.fillRect(0,0,W,H);

  // 太阳
  let sunG = ctx.createRadialGradient(W-120,90,8,W-120,90,90);
  sunG.addColorStop(0,'rgba(255,252,200,1)');
  sunG.addColorStop(0.35,'rgba(255,235,80,0.85)');
  sunG.addColorStop(1,'rgba(255,220,50,0)');
  ctx.fillStyle = sunG;
  ctx.beginPath();
  ctx.arc(W-120,90,90,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='rgba(255,250,200,0.95)';
  ctx.beginPath();
  ctx.arc(W-120,90,38,0,Math.PI*2);
  ctx.fill();
  // 光芒
  ctx.save();
  ctx.translate(W-120,90);
  for(let i=0;i<14;i++){
    let a=i/14*Math.PI*2+t*0.4;
    ctx.strokeStyle='rgba(255,240,100,0.25)';
    ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*45,Math.sin(a)*45);
    ctx.lineTo(Math.cos(a)*85,Math.sin(a)*85);
    ctx.stroke();
  }
  ctx.restore();

  // 云
  [{x:150,y:70},{x:500,y:50},{x:850,y:80}].forEach((c,i)=>{
    let cx2=c.x+Math.sin(t*0.25+i*2)*20;
    drawCloud(cx2,c.y,1.1,0.95);
  });

  // 大海
  let seaY = H*0.52;
  for(let y=seaY;y<H*0.72;y++){
    let r2=(y-seaY)/(H*0.72-seaY);
    let rr=lerp(28,60,r2), gg=lerp(120,160,r2), bb=lerp(200,220,r2);
    ctx.fillStyle=`rgb(${rr|0},${gg|0},${bb|0})`;
    ctx.fillRect(0,y,W,1);
  }

  // 波浪（多层）
  for(let layer=0;layer<5;layer++){
    let wy = seaY+8+layer*18;
    let wOff = t*55+layer*160;
    ctx.strokeStyle=`rgba(180,230,255,${0.5-layer*0.07})`;
    ctx.lineWidth=2.5-layer*0.3;
    ctx.beginPath();
    for(let x=0;x<=W;x+=6){
      let y2=wy+Math.sin((x+wOff)/75)*6+Math.sin((x+wOff*0.6)/38)*3;
      x===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2);
    }
    ctx.stroke();
    // 浪花
    ctx.strokeStyle=`rgba(255,255,255,${0.25-layer*0.04})`;
    ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let x=0;x<=W;x+=6){
      let y2=wy-2+Math.sin((x+wOff)/75)*6+Math.sin((x+wOff*0.6)/38)*3;
      x===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2);
    }
    ctx.stroke();
  }

  // 沙滩
  let sandY = H*0.72;
  let sandG = ctx.createLinearGradient(0,sandY,0,H);
  sandG.addColorStop(0,'#F5DFA0');
  sandG.addColorStop(0.3,'#EDD080');
  sandG.addColorStop(1,'#D4A855');
  ctx.fillStyle = sandG;
  ctx.beginPath();
  ctx.moveTo(0,sandY);
  for(let x=0;x<=W;x+=20){
    let wy=sandY+Math.sin(x/100)*5;
    ctx.lineTo(x,wy);
  }
  ctx.lineTo(W,H);
  ctx.lineTo(0,H);
  ctx.closePath();
  ctx.fill();

  // 沙滩湿沙反光
  ctx.fillStyle='rgba(180,210,240,0.25)';
  ctx.beginPath();
  ctx.moveTo(0,sandY);
  for(let x=0;x<=W;x+=20){
    let wy=sandY+Math.sin(x/100)*5;
    ctx.lineTo(x,wy);
  }
  ctx.lineTo(W,sandY+30);
  ctx.lineTo(0,sandY+30);
  ctx.closePath();
  ctx.fill();

  // 贝壳
  for(let i=0;i<20;i++){
    let sx=60+i*65, sy=sandY+12+i%4*10;
    ctx.fillStyle=['#FFB6C1','#FFF8DC','#E8D5B7','#B5E8FF'][i%4];
    ctx.beginPath();
    ctx.ellipse(sx,sy,6,4,i*0.3,0,Math.PI*2);
    ctx.fill();
  }

  // 脚印
  for(let i=0;i<12;i++){
    let fpx=mx-i*60-20;
    if(fpx<0||fpx>W) continue;
    ctx.fillStyle='rgba(190,155,70,0.5)';
    ctx.beginPath();
    ctx.ellipse(fpx,sandY+18+i%2*8,5,3,i%2?0.2:-0.2,0,Math.PI*2);
    ctx.fill();
  }

  // 棕榈树
  [120,500,1000].forEach((tx,i)=>{
    drawPalm(tx, sandY-5, t, i);
  });

  // 海鸥
  for(let i=0;i<7;i++){
    let bx=((200+i*160+t*22)%W);
    let by=60+i*18+Math.sin(t*1.8+i)*12;
    let wing=Math.sin(t*4+i)*5;
    ctx.strokeStyle='rgba(250,250,255,0.85)';
    ctx.lineWidth=1.8;
    ctx.beginPath();
    ctx.moveTo(bx-10,by+wing);ctx.lineTo(bx,by);ctx.lineTo(bx+10,by+wing);
    ctx.stroke();
  }

  drawSkyKid(mx, sandY, t, 'walk');
  draw_txt_scene('漫步沙滩','rgba(255,220,120,0.9)');
}

/* =====================================================
   场景5：游江
   ===================================================== */
function drawRiver(t, mx){
  // 天空
  let skyG = ctx.createLinearGradient(0,0,0,H*0.38);
  skyG.addColorStop(0,'#4A8DB5');
  skyG.addColorStop(1,'#A8D5F0');
  ctx.fillStyle=skyG;
  ctx.fillRect(0,0,W,H*0.38);

  // 云雾
  drawCloud(200,60,1.0,0.7);
  drawCloud(650,40,1.2,0.6);
  drawCloud(1050,70,0.9,0.7);

  // 远山（水墨感）
  ctx.fillStyle='rgba(100,140,170,0.35)';
  ctx.beginPath();
  ctx.moveTo(0,H*0.38);
  for(let x=0;x<=W;x+=25){
    let hy=H*0.38-Math.sin(x/100)*55-Math.sin(x/45)*20;
    ctx.lineTo(x,hy);
  }
  ctx.lineTo(W,H*0.38);
  ctx.closePath();
  ctx.fill();

  // 两岸
  let bankTop=H*0.38, bankH=80;
  let groundG1=ctx.createLinearGradient(0,bankTop,0,bankTop+bankH);
  groundG1.addColorStop(0,'#4A9040');
  groundG1.addColorStop(1,'#2D6020');
  ctx.fillStyle=groundG1;
  ctx.fillRect(0,bankTop,W,bankH);

  let bankBot=H*0.72;
  let groundG2=ctx.createLinearGradient(0,bankBot,0,H);
  groundG2.addColorStop(0,'#4A9040');
  groundG2.addColorStop(1,'#2D6020');
  ctx.fillStyle=groundG2;
  ctx.fillRect(0,bankBot,W,H-bankBot);

  // 江水
  let riverY=bankTop+bankH;
  for(let y=riverY;y<bankBot;y++){
    let r2=(y-riverY)/(bankBot-riverY);
    let rr=lerp(40,60,r2),gg=lerp(120,150,r2),bb=lerp(180,200,r2);
    ctx.fillStyle=`rgb(${rr|0},${gg|0},${bb|0})`;
    ctx.fillRect(0,y,W,1);
  }

  // 江面纹理（水波）
  for(let i=0;i<10;i++){
    let wy=riverY+20+i*20;
    let wOff=t*45+i*100;
    ctx.strokeStyle=`rgba(160,210,240,${0.25})`;
    ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let x=0;x<=W;x+=8){
      let y2=wy+Math.sin((x+wOff)/65)*4;
      x===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2);
    }
    ctx.stroke();
  }

  // 夕阳倒影（江面光斑）
  for(let i=0;i<3;i++){
    let rx=W*0.3+i*W*0.2;
    let rg=ctx.createLinearGradient(rx-20,riverY,rx+20,bankBot);
    rg.addColorStop(0,'rgba(255,220,100,0.0)');
    rg.addColorStop(0.5,`rgba(255,220,100,${0.1+i*0.03})`);
    rg.addColorStop(1,'rgba(255,220,100,0.0)');
    ctx.fillStyle=rg;
    ctx.fillRect(rx-20,riverY,40,bankBot-riverY);
  }

  // 芦苇
  for(let i=0;i<22;i++){
    let rx=20+i*60;
    let ry=bankTop+bankH-5;
    let sw2=Math.sin(t*1.5+i*0.6)*4;
    ctx.strokeStyle='rgba(160,130,40,0.9)';
    ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.moveTo(rx,ry);
    ctx.quadraticCurveTo(rx+sw2,ry-25,rx+sw2*1.5,ry-48);
    ctx.stroke();
    ctx.fillStyle='rgba(120,90,30,0.8)';
    ctx.beginPath();
    ctx.ellipse(rx+sw2*1.5,ry-52,4,9,0.2,0,Math.PI*2);
    ctx.fill();
  }
  for(let i=0;i<22;i++){
    let rx=20+i*60;
    let ry=bankBot+5;
    let sw2=Math.sin(t*1.5+i*0.6+1)*4;
    ctx.strokeStyle='rgba(160,130,40,0.9)';
    ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.moveTo(rx,ry);
    ctx.quadraticCurveTo(rx+sw2,ry-22,rx+sw2*1.5,ry-42);
    ctx.stroke();
    ctx.fillStyle='rgba(120,90,30,0.8)';
    ctx.beginPath();
    ctx.ellipse(rx+sw2*1.5,ry-46,4,9,0.2,0,Math.PI*2);
    ctx.fill();
  }

  // 水花（游泳溅起）
  for(let i=0;i<8;i++){
    let wx=mx+(i-4)*14+Math.sin(t*8+i)*3;
    let wy=riverY+(bankBot-riverY)*0.5+Math.sin(t*7+i)*3;
    ctx.fillStyle=`rgba(200,235,255,${0.4+Math.sin(t*6+i)*0.2})`;
    ctx.beginPath();
    ctx.arc(wx,wy,2+Math.sin(t*8+i)*1.5,0,Math.PI*2);
    ctx.fill();
  }

  let swimY=riverY+(bankBot-riverY)*0.5;
  drawSkyKid(mx, swimY, t, 'swim');
  draw_txt_scene('游过大江','rgba(160,220,255,0.9)');
}

/* =====================================================
   场景6：夕阳岩石
   ===================================================== */
function drawSunset(t, mx){
  // 天空（壮丽黄昏）
  let skyG = ctx.createLinearGradient(0,0,0,H);
  skyG.addColorStop(0,'#0D0520');
  skyG.addColorStop(0.15,'#3A1050');
  skyG.addColorStop(0.35,'#8B2500');
  skyG.addColorStop(0.55,'#D45A00');
  skyG.addColorStop(0.75,'#F08020');
  skyG.addColorStop(0.9,'#F5A030');
  skyG.addColorStop(1,'#E8881A');
  ctx.fillStyle = skyG;
  ctx.fillRect(0,0,W,H);

  // 夕阳
  let sunCX=W*0.5, sunCY=H*0.48;
  let sunPulse=1+0.015*Math.sin(t*2);
  let sunG=ctx.createRadialGradient(sunCX,sunCY,8,sunCX,sunCY,130);
  sunG.addColorStop(0,'rgba(255,255,200,1)');
  sunG.addColorStop(0.15,'rgba(255,220,80,0.95)');
  sunG.addColorStop(0.4,'rgba(255,140,20,0.7)');
  sunG.addColorStop(0.7,'rgba(220,80,10,0.3)');
  sunG.addColorStop(1,'rgba(180,40,0,0)');
  ctx.fillStyle=sunG;
  ctx.beginPath();
  ctx.arc(sunCX,sunCY,130*sunPulse,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='rgba(255,252,200,0.95)';
  ctx.beginPath();
  ctx.arc(sunCX,sunCY,45*sunPulse,0,Math.PI*2);
  ctx.fill();

  // 太阳光晕环
  for(let ring=0;ring<3;ring++){
    let rr=80+ring*50;
    ctx.strokeStyle=`rgba(255,${180-ring*30},${50-ring*15},${0.15-ring*0.04})`;
    ctx.lineWidth=12-ring*3;
    ctx.beginPath();
    ctx.arc(sunCX,sunCY,rr*sunPulse,0,Math.PI*2);
    ctx.stroke();
  }

  // 霞光云彩
  let cloudData=[
    {x:120,y:80, r:1.2, h:0.5},
    {x:350,y:55, r:0.9, h:0.4},
    {x:750,y:70, r:1.1, h:0.45},
    {x:1050,y:60,r:1.0, h:0.5},
  ];
  cloudData.forEach((c,i)=>{
    ctx.save();
    ctx.globalAlpha=0.75;
    let cx2=c.x+Math.sin(t*0.2+i)*18;
    // 染上霞光色
    ctx.shadowColor='rgba(255,120,30,0.5)';
    ctx.shadowBlur=20;
    drawCloudColor(cx2,c.y,c.r,`rgba(${200+i*10},${80+i*15},${20+i*8},0.85)`);
    ctx.restore();
  });

  // 星星（天幕渐现）
  for(let i=0;i<35;i++){
    let sx=(i*173+80)%W;
    let sy=(i*97+20)%(H*0.42);
    let blink=0.4+0.6*Math.abs(Math.sin(t*1.5+i*0.8));
    ctx.fillStyle=`rgba(255,245,210,${blink*0.85})`;
    ctx.shadowColor='rgba(255,240,180,0.8)';
    ctx.shadowBlur=6;
    ctx.beginPath();
    ctx.arc(sx,sy,1.2+Math.sin(i)*0.5,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
  }

  // 大海
  let seaY=H*0.62;
  for(let y=seaY;y<H;y++){
    let r2=(y-seaY)/(H-seaY);
    let rr=lerp(15,35,r2),gg=lerp(30,60,r2),bb=lerp(70,100,r2);
    ctx.fillStyle=`rgb(${rr|0},${gg|0},${bb|0})`;
    ctx.fillRect(0,y,W,1);
  }

  // 夕阳海面倒影（金色光柱）
  let refG=ctx.createLinearGradient(sunCX-120,seaY,sunCX+120,H);
  refG.addColorStop(0,'rgba(255,180,40,0)');
  refG.addColorStop(0.2,'rgba(255,160,30,0.35)');
  refG.addColorStop(0.6,'rgba(255,140,20,0.2)');
  refG.addColorStop(1,'rgba(200,100,10,0)');
  ctx.fillStyle=refG;
  ctx.beginPath();
  ctx.moveTo(sunCX-30,seaY);
  ctx.lineTo(sunCX-120,H);
  ctx.lineTo(sunCX+120,H);
  ctx.lineTo(sunCX+30,seaY);
  ctx.closePath();
  ctx.fill();

  // 海浪（暗色）
  for(let i=0;i<5;i++){
    let wy=seaY+5+i*18;
    let wOff=t*35+i*200;
    ctx.strokeStyle=`rgba(${80+i*10},${100+i*8},${140+i*10},0.5)`;
    ctx.lineWidth=2;
    ctx.beginPath();
    for(let x=0;x<=W;x+=8){
      let y2=wy+Math.sin((x+wOff)/85)*5;
      x===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2);
    }
    ctx.stroke();
    // 浪尖泡沫
    ctx.strokeStyle=`rgba(180,160,120,0.2)`;
    ctx.lineWidth=1;
    ctx.beginPath();
    for(let x=0;x<=W;x+=8){
      let y2=wy-1+Math.sin((x+wOff)/85)*5;
      x===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2);
    }
    ctx.stroke();
  }

  // 远礁石（剪影）
  [[200,seaY+8,55,22],[420,seaY+5,38,15],[800,seaY+10,65,28],
   [970,seaY+6,42,18]].forEach(([rx,ry,rw,rh])=>{
    ctx.fillStyle='rgba(20,15,28,0.85)';
    ctx.beginPath();
    ctx.moveTo(rx-rw,ry+5);
    for(let x=rx-rw;x<=rx+rw;x++){
      let prog=(x-(rx-rw))/(rw*2);
      let yy=ry-rh*Math.sin(prog*Math.PI)*
             (0.7+0.3*Math.sin(prog*Math.PI*2));
      ctx.lineTo(x,yy);
    }
    ctx.lineTo(rx+rw,ry+5);
    ctx.closePath();
    ctx.fill();
  });

  // 主岩石（小人坐的）
  let rockX=mx, rockY=seaY-18;
  ctx.fillStyle='#1C1520';
  ctx.beginPath();
  ctx.moveTo(rockX-80,rockY+20);
  for(let x=rockX-80;x<=rockX+80;x++){
    let prog=(x-(rockX-80))/160;
    let rh2=62*(Math.sin(prog*Math.PI))*(0.65+0.35*Math.sin(prog*Math.PI*1.8));
    ctx.lineTo(x,rockY-rh2);
  }
  ctx.lineTo(rockX+80,rockY+20);
  ctx.closePath();
  ctx.fill();
  // 岩石高光
  ctx.fillStyle='rgba(80,65,55,0.6)';
  ctx.beginPath();
  ctx.moveTo(rockX-55,rockY-30);
  ctx.quadraticCurveTo(rockX-20,rockY-65,rockX+10,rockY-55);
  ctx.quadraticCurveTo(rockX-10,rockY-48,rockX-50,rockY-25);
  ctx.closePath();
  ctx.fill();
  // 岩石苔藓
  for(let i=0;i<6;i++){
    ctx.fillStyle=`rgba(30,55,25,${0.5+i*0.05})`;
    ctx.beginPath();
    ctx.arc(rockX-40+i*15,rockY-20+i%2*8,5+i%3*2,0,Math.PI*2);
    ctx.fill();
  }

  // 飞鸟剪影（夕阳归巢）
  for(let i=0;i<7;i++){
    let bx=((80+i*180+t*15)%W);
    let by=H*0.18+i*22+Math.sin(t*1.2+i)*14;
    let wing=Math.sin(t*2.5+i*0.9)*8;
    ctx.strokeStyle='rgba(15,8,25,0.75)';
    ctx.lineWidth=1.8;
    ctx.beginPath();
    ctx.moveTo(bx-12,by+wing);
    ctx.lineTo(bx,by);
    ctx.lineTo(bx+12,by+wing);
    ctx.stroke();
  }

  // 小人（坐在岩石上）
  ctx.save();
  ctx.shadowColor='rgba(255,180,50,0.7)';
  ctx.shadowBlur=25;
  drawSkyKid(rockX-8, rockY-62, t, 'sit');
  ctx.restore();

  draw_txt_scene('岩石上看夕阳','rgba(255,200,100,0.9)');
}

/* =====================================================
   通用辅助绘制函数
   ===================================================== */
function drawCloud(cx,cy,scl,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.shadowColor='rgba(200,220,255,0.4)';
  ctx.shadowBlur=12;
  ctx.beginPath();
  ctx.arc(cx,      cy,    28*scl,0,Math.PI*2);
  ctx.arc(cx+32*scl,cy-10*scl,22*scl,0,Math.PI*2);
  ctx.arc(cx+60*scl,cy,   25*scl,0,Math.PI*2);
  ctx.arc(cx+85*scl,cy+5*scl,18*scl,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawCloudColor(cx,cy,scl,color){
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.arc(cx,       cy,     28*scl,0,Math.PI*2);
  ctx.arc(cx+32*scl,cy-10*scl,22*scl,0,Math.PI*2);
  ctx.arc(cx+60*scl,cy,    25*scl,0,Math.PI*2);
  ctx.arc(cx+85*scl,cy+5*scl,18*scl,0,Math.PI*2);
  ctx.fill();
}

function drawBirds(t,alpha){
  ctx.save();
  ctx.globalAlpha=alpha||0.7;
  ctx.strokeStyle='rgba(40,40,60,0.85)';
  ctx.lineWidth=1.8;
  [300,480,660,840,1020].forEach((bx,i)=>{
    let by=55+i*18+Math.sin(t*1.2+i)*12;
    let bxf=((bx+t*18)%W);
    let wing=Math.sin(t*3.5+i*0.7)*6;
    ctx.beginPath();
    ctx.moveTo(bxf-10,by+wing);
    ctx.lineTo(bxf,by);
    ctx.lineTo(bxf+10,by+wing);
    ctx.stroke();
  });
  ctx.restore();
}

function drawTree(x,y,scl,t){
  let h=120*scl;
  // 树干
  ctx.fillStyle='#5C3A1A';
  ctx.fillRect(x-5*scl,y-h*0.4,10*scl,h*0.4);
  // 树枝
  ctx.strokeStyle='#5C3A1A';
  ctx.lineWidth=3*scl;
  ctx.beginPath();
  ctx.moveTo(x,y-h*0.35);
  ctx.lineTo(x-22*scl,y-h*0.6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x,y-h*0.45);
  ctx.lineTo(x+18*scl,y-h*0.68);
  ctx.stroke();
  // 树冠（多层）
  let swing=Math.sin(t*0.8)*3;
  [[0,h,45*scl,'#2E7D22'],[-18*scl,h*0.75,32*scl,'#388E3C'],
   [18*scl,h*0.72,30*scl,'#43A047'],[-8*scl,h*0.5,28*scl,'#4CAF50']
  ].forEach(([ox,oy,r,c])=>{
    ctx.fillStyle=c;
    ctx.shadowColor='rgba(0,60,0,0.3)';
    ctx.shadowBlur=8;
    ctx.beginPath();
    ctx.arc(x+ox+swing,y-oy,r,0,Math.PI*2);
    ctx.fill();
  });
  ctx.shadowBlur=0;
}

function drawSnowTree(x,y,scl,t){
  let h=100*scl;
  ctx.fillStyle='#3D2B1A';
  ctx.fillRect(x-4*scl,y,8*scl,30*scl);
  // 三层锥形树冠
  for(let layer=0;layer<4;layer++){
    let lw=(50-layer*9)*scl;
    let ly=y-layer*22*scl;
    let sw2=Math.sin(t*0.8+layer)*2;
    ctx.fillStyle=`rgba(${30+layer*5},${70+layer*5},${35+layer*3},0.9)`;
    ctx.beginPath();
    ctx.moveTo(x+sw2,ly-28*scl);
    ctx.lineTo(x-lw+sw2,ly);
    ctx.lineTo(x+lw+sw2,ly);
    ctx.closePath();
    ctx.fill();
    // 积雪
    ctx.fillStyle='rgba(235,248,255,0.88)';
    ctx.beginPath();
    ctx.moveTo(x+sw2,ly-28*scl);
    ctx.lineTo(x-lw*0.5+sw2,ly-8*scl);
    ctx.lineTo(x+lw*0.5+sw2,ly-8*scl);
    ctx.closePath();
    ctx.fill();
  }
}

function drawMapleTree(x,y,scl,t,seed){
  let h=160*scl;
  let leafC=['#CC2200','#E83500','#FF5500','#FF7700',
             '#FF9900','#FFB300','#DD1100'];
  // 树干
  ctx.fillStyle='#2D1500';
  ctx.fillRect(x-6*scl,y-h*0.35,12*scl,h*0.35);
  // 主枝
  ctx.strokeStyle='#3D2000';
  ctx.lineWidth=4*scl;
  [[-35,-0.6],[35,-0.65],[-18,-0.8],[20,-0.82]].forEach(([ox,oy])=>{
    ctx.beginPath();
    ctx.moveTo(x,y-h*0.3);
    ctx.lineTo(x+ox*scl,y-h*Math.abs(oy));
    ctx.stroke();
  });
  // 树冠（大量小圆）
  let swing=Math.sin(t*1.0+seed)*4;
  for(let i=0;i<14;i++){
    let ang=i/14*Math.PI*2;
    let dist=(28+Math.sin(i*1.5+seed)*12)*scl;
    let cx2=x+Math.cos(ang)*dist+swing;
    let cy2=y-h*0.65-Math.sin(ang)*dist*0.5;
    let r=(22+Math.sin(i*2+seed)*8)*scl;
    ctx.fillStyle=leafC[(i+seed)%leafC.length];
    ctx.shadowColor='rgba(180,50,0,0.3)';
    ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.arc(cx2,cy2,r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.shadowBlur=0;
}

function drawPalm(x,y,t,seed){
  // 弯曲树干
  let lean=Math.sin(t*0.4+seed)*3;
  ctx.strokeStyle='#6B4226';
  ctx.lineWidth=14;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.quadraticCurveTo(x+lean*8,y-70,x+lean*15,y-140);
  ctx.stroke();
  // 树干纹理
  ctx.strokeStyle='rgba(80,45,15,0.5)';
  ctx.lineWidth=1;
  for(let i=0;i<8;i++){
    let py=y-i*18;
    ctx.beginPath();
    ctx.moveTo(x-6,py);
    ctx.lineTo(x+6,py);
    ctx.stroke();
  }
  // 叶子
  let crowX=x+lean*15, crowY=y-140;
  for(let i=0;i<8;i++){
    let ang=i/8*Math.PI*2+t*0.25;
    let len=55+Math.sin(ang*2)*10;
    let ex=crowX+Math.cos(ang)*len;
    let ey=crowY+Math.sin(ang)*len*0.45;
    let grad=ctx.createLinearGradient(crowX,crowY,ex,ey);
    grad.addColorStop(0,'#1A6B20');
    grad.addColorStop(1,'#0D4010');
    ctx.strokeStyle=grad;
    ctx.lineWidth=5;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(crowX,crowY);
    ctx.quadraticCurveTo(
      (crowX+ex)/2+Math.cos(ang+Math.PI/2)*10,
      (crowY+ey)/2+Math.sin(ang+Math.PI/2)*10,
      ex,ey
    );
    ctx.stroke();
  }
  ctx.fillStyle='#2A1A08';
  ctx.beginPath();
  ctx.arc(crowX,crowY,7,0,Math.PI*2);
  ctx.fill();
}

function drawGrassTuft(x,y,t,seed){
  let sw2=Math.sin(t*1.5+seed*0.8)*3;
  let colors=['#3A9E2A','#4DB340','#2E8022'];
  [[-5,0],[-2,-3],[0,-5],[3,-4],[6,-1]].forEach(([ox,len],i)=>{
    ctx.strokeStyle=colors[i%3];
    ctx.lineWidth=2;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(x+ox,y);
    ctx.quadraticCurveTo(
      x+ox+sw2*0.5,y-(12+len)*0.6,
      x+ox+sw2,y-(12+len)
    );
    ctx.stroke();
  });
}

function drawLeafShape(r){
  ctx.beginPath();
  ctx.moveTo(0,-r);
  ctx.quadraticCurveTo(r,-r*0.3,r*0.3,r*0.8);
  ctx.quadraticCurveTo(0,r*0.3,-r*0.3,r*0.8);
  ctx.quadraticCurveTo(-r,-r*0.3,0,-r);
  ctx.closePath();
  ctx.fill();
}

function drawButterfly(x,y,t){
  ctx.save();
  ctx.translate(x,y);
  let wing=Math.sin(t*5)*0.6;
  [1,-1].forEach(side=>{
    ctx.save();
    ctx.scale(side,1);
    ctx.fillStyle='rgba(255,180,220,0.75)';
    ctx.beginPath();
    ctx.ellipse(10,0,14,10,-wing*side,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='rgba(255,140,180,0.5)';
    ctx.beginPath();
    ctx.ellipse(8,8,10,7,wing*side*0.5,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
  ctx.fillStyle='rgba(60,30,10,0.8)';
  ctx.beginPath();
  ctx.ellipse(0,0,2,7,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function draw_txt_scene(text,color){
  ctx.save();
  ctx.font='bold 22px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillStyle=color||'rgba(255,255,255,0.85)';
  ctx.shadowColor='rgba(0,0,0,0.5)';
  ctx.shadowBlur=8;
  ctx.textAlign='center';
  ctx.fillText(text,W/2,H-32);
  ctx.restore();
}

/* =====================================================
   生日画面
   ===================================================== */
function initBirthday(){
  bdayParticles=[];
  for(let i=0;i<2200;i++){
    let tt=Math.random()*Math.PI*2;
    let hx=16*Math.pow(Math.sin(tt),3);
    let hy=13*Math.cos(tt)-5*Math.cos(2*tt)-2*Math.cos(3*tt)-Math.cos(4*tt);
    let sc=0.72+Math.random()*0.28;
    bdayParticles.push({
      x:rand(0,W), y:rand(0,H),
      tx:W/2+hx*22*sc,
      ty:H/2-hy*22*sc-50,
      vx:0, vy:0,
      phase:Math.random()*Math.PI*2,
      r:255,g:100,b:150
    });
  }
  fireworks=[];
}

function spawnFirework(){
  let fw={
    x:rand(150,W-150), y:rand(60,H*0.45),
    particles:[], alive:true
  };
  let h=Math.random();
  let [r,g,b]=[0,0,0];
  // 简单hsv转rgb
  let i=Math.floor(h*6),f=h*6-i;
  let v=1,s=0.9;
  let p=v*(1-s),q2=v*(1-f*s),tv2=v*(1-(1-f)*s);
  if(i===0){r=v;g=tv2;b=p;}
  else if(i===1){r=q2;g=v;b=p;}
  else if(i===2){r=p;g=v;b=tv2;}
  else if(i===3){r=p;g=q2;b=v;}
  else if(i===4){r=tv2;g=p;b=v;}
  else{r=v;g=p;b=q2;}
  r=(r*255)|0;g=(g*255)|0;b=(b*255)|0;
  for(let k=0;k<80;k++){
    let ang=Math.random()*Math.PI*2;
    let sp=rand(3,11);
    fw.particles.push({
      x:fw.x,y:fw.y,
      vx:Math.cos(ang)*sp,
      vy:Math.sin(ang)*sp,
      life:rand(45,90),mlife:90,
      r,g,b
    });
  }
  fireworks.push(fw);
}

function updateBirthday(dt){
  bdayTime+=dt;
  // 更新爱心粒子
  bdayParticles.forEach(p=>{
    let dx=p.tx-p.x, dy=p.ty-p.y;
    p.vx=p.vx*0.70+dx*0.14;
    p.vy=p.vy*0.70+dy*0.14;
    p.x+=p.vx+Math.sin(bdayTime*2+p.phase)*0.4;
    p.y+=p.vy+Math.cos(bdayTime*2+p.phase)*0.4;
    let hue=(p.phase/(Math.PI*2)+bdayTime*0.05)%1;
    let i2=Math.floor(hue*6)%6;
    let f2=hue*6-Math.floor(hue*6);
    let v=255,s=0.85,pv=(1-s)*v;
    let q3=v*(1-f2*s)|0,tv3=v*(1-(1-f2)*s)|0;
    let rr,gg,bb;
    if(i2===0){rr=v;gg=tv3;bb=pv;}
    else if(i2===1){rr=q3;gg=v;bb=pv;}
    else if(i2===2){rr=pv;gg=v;bb=tv3;}
    else if(i2===3){rr=pv;gg=q3;bb=v;}
    else if(i2===4){rr=tv3;gg=pv;bb=v;}
    else{rr=v;gg=pv;bb=q3;}
    p.r=rr|0; p.g=gg|0; p.b=bb|0;
  });
  // 更新烟花
  fireworks=fireworks.filter(fw=>{
    fw.particles=fw.particles.filter(p=>{
      p.x+=p.vx; p.y+=p.vy;
      p.vy+=0.07;
      p.vx*=0.997; p.vy*=0.997;
      p.life--;
      return p.life>0;
    });
    return fw.particles.length>0;
  });
}

function drawBirthday1(){
  // 深色背景+残影
  ctx.fillStyle='rgba(4,5,18,0.055)';
  ctx.fillRect(0,0,W,H);
  if(bdayTime<0.08){
    ctx.fillStyle='rgb(4,5,18)';
    ctx.fillRect(0,0,W,H);
  }
  // 月亮
  ctx.fillStyle='rgba(255,252,220,0.92)';
  ctx.shadowColor='rgba(255,240,180,0.6)';
  ctx.shadowBlur=20;
  ctx.beginPath();
  ctx.arc(W-110,65,35,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='rgb(4,5,18)';
  ctx.beginPath();
  ctx.arc(W-90,60,28,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;
  // 星星
  for(let i=0;i<55;i++){
    let sx=(i*173+60)%W, sy=(i*97+25)%(H*0.55);
    let blink=0.35+0.65*Math.abs(Math.sin(bdayTime*1.6+i*0.65));
    ctx.fillStyle=`rgba(255,245,210,${blink*0.88})`;
    ctx.shadowColor='rgba(255,235,180,0.7)';
    ctx.shadowBlur=5;
    ctx.beginPath();
    ctx.arc(sx,sy,1.1+Math.sin(i)*0.4,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
  }
  // 爱心粒子
  bdayParticles.forEach(p=>{
    ctx.fillStyle=`rgb(${p.r},${p.g},${p.b})`;
    ctx.globalAlpha=0.82;
    ctx.fillRect(p.x,p.y,2,2);
    ctx.fillRect(p.x+1,p.y,2,2);
  });
  ctx.globalAlpha=1;
  // 烟花
  fireworks.forEach(fw=>{
    fw.particles.forEach(p=>{
      let a=p.life/p.mlife;
      ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${a*0.88})`;
      ctx.fillRect(p.x|0,p.y|0,2,2);
    });
  });
  // 主文字（大）
  ctx.save();
  ctx.textAlign='center';
  // 描边
  ctx.font='bold 80px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.lineWidth=6;
  ctx.strokeStyle='rgba(10,5,25,0.7)';
  ctx.strokeText('妈妈生日快乐',W/2,H*0.72);
  // 渐变主色
  let pulse=0.75+0.25*Math.sin(bdayTime*2.5);
  let tg=ctx.createLinearGradient(W/2-220,H*0.65,W/2+220,H*0.72);
  tg.addColorStop(0,`rgba(255,180,220,${pulse})`);
  tg.addColorStop(0.3,`rgba(255,240,120,${pulse})`);
  tg.addColorStop(0.6,`rgba(180,220,255,${pulse})`);
  tg.addColorStop(1,`rgba(255,180,220,${pulse})`);
  ctx.fillStyle=tg;
  ctx.shadowColor='rgba(255,180,100,0.6)';
  ctx.shadowBlur=22;
  ctx.fillText('妈妈生日快乐',W/2,H*0.72);
  ctx.restore();
  // 底部按钮提示
  drawBtn('继续',W/2,H*0.88,200,54,true);
}

function drawBirthday2(){
  ctx.fillStyle='rgba(4,5,18,0.055)';
  ctx.fillRect(0,0,W,H);
  if(bdayTime<0.08){
    ctx.fillStyle='rgb(4,5,18)';
    ctx.fillRect(0,0,W,H);
  }
  // 星星
  for(let i=0;i<55;i++){
    let sx=(i*173+60)%W, sy=(i*97+25)%(H*0.55);
    let blink=0.35+0.65*Math.abs(Math.sin(bdayTime*1.6+i*0.65));
    ctx.fillStyle=`rgba(255,245,210,${blink*0.88})`;
    ctx.beginPath();
    ctx.arc(sx,sy,1.1+Math.sin(i)*0.4,0,Math.PI*2);
    ctx.fill();
  }
  // 爱心粒子
  bdayParticles.forEach(p=>{
    ctx.fillStyle=`rgb(${p.r},${p.g},${p.b})`;
    ctx.globalAlpha=0.82;
    ctx.fillRect(p.x,p.y,2,2);
    ctx.fillRect(p.x+1,p.y,2,2);
  });
  ctx.globalAlpha=1;
  // 烟花
  fireworks.forEach(fw=>{
    fw.particles.forEach(p=>{
      let a=p.life/p.mlife;
      ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${a*0.88})`;
      ctx.fillRect(p.x|0,p.y|0,2,2);
    });
  });
  // 第一行（小一点）
  ctx.save();
  ctx.textAlign='center';
  ctx.font='bold 80px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.lineWidth=5;
  ctx.strokeStyle='rgba(10,5,25,0.6)';
  ctx.strokeText('妈妈生日快乐',W/2,H*0.55);
  let tg=ctx.createLinearGradient(W/2-220,H*0.48,W/2+220,H*0.55);
  tg.addColorStop(0,'rgba(255,180,220,0.85)');
  tg.addColorStop(0.5,'rgba(255,240,120,0.85)');
  tg.addColorStop(1,'rgba(255,180,220,0.85)');
  ctx.fillStyle=tg;
  ctx.shadowColor='rgba(255,180,100,0.5)';
  ctx.shadowBlur=18;
  ctx.fillText('妈妈生日快乐',W/2,H*0.55);
  // 第二行
  ctx.font='bold 58px "Microsoft YaHei","PingFang SC",sans-serif';
  let pulse=0.75+0.25*Math.sin(bdayTime*2);
  let tg2=ctx.createLinearGradient(W/2-180,H*0.67,W/2+180,H*0.73);
  tg2.addColorStop(0,`rgba(180,240,255,${pulse})`);
  tg2.addColorStop(0.5,`rgba(255,220,180,${pulse})`);
  tg2.addColorStop(1,`rgba(180,240,255,${pulse})`);
  ctx.strokeStyle='rgba(10,5,25,0.5)';
  ctx.lineWidth=4;
  ctx.strokeText('身体健康，天天开心',W/2,H*0.72);
  ctx.fillStyle=tg2;
  ctx.shadowColor='rgba(180,220,255,0.5)';
  ctx.shadowBlur=18;
  ctx.fillText('身体健康，天天开心',W/2,H*0.72);
  ctx.restore();
  // 返回按钮
  drawBtn('重新开始',W/2,H*0.88,200,54,true);
}

/* =====================================================
   发光按钮（光遇风格）
   ===================================================== */
function drawBtn(text,cx,cy,w,h,glow){
  ctx.save();
  // 外发光
  if(glow){
    let btnG=ctx.createRadialGradient(cx,cy,5,cx,cy,w*0.7);
    btnG.addColorStop(0,'rgba(255,220,130,0.22)');
    btnG.addColorStop(1,'rgba(255,180,60,0)');
    ctx.fillStyle=btnG;
    ctx.beginPath();
    ctx.ellipse(cx,cy,w*0.7,h*1.5,0,0,Math.PI*2);
    ctx.fill();
  }
  // 按钮背景
  let bg=ctx.createLinearGradient(cx-w/2,cy-h/2,cx+w/2,cy+h/2);
  bg.addColorStop(0,'rgba(60,45,20,0.85)');
  bg.addColorStop(1,'rgba(30,20,8,0.85)');
  ctx.fillStyle=bg;
  ctx.shadowColor='rgba(255,200,80,0.55)';
  ctx.shadowBlur=18;
  ctx.beginPath();
  ctx.roundRect(cx-w/2,cy-h/2,w,h,h/2);
  ctx.fill();
  // 边框（光遇发光边框）
  let bdrG=ctx.createLinearGradient(cx-w/2,cy-h/2,cx+w/2,cy+h/2);
  bdrG.addColorStop(0,'rgba(255,240,160,0.9)');
  bdrG.addColorStop(0.5,'rgba(255,200,80,0.7)');
  bdrG.addColorStop(1,'rgba(255,160,40,0.9)');
  ctx.strokeStyle=bdrG;
  ctx.lineWidth=2;
  ctx.shadowColor='rgba(255,200,80,0.8)';
  ctx.shadowBlur=12;
  ctx.beginPath();
  ctx.roundRect(cx-w/2,cy-h/2,w,h,h/2);
  ctx.stroke();
  // 文字
  ctx.shadowColor='rgba(255,220,100,0.8)';
  ctx.shadowBlur=10;
  ctx.fillStyle='rgba(255,240,190,0.95)';
  ctx.font='bold 22px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(text,cx,cy);
  ctx.restore();
}

function drawNextBtn(){
  let cx=W-80, cy=H-55;
  drawBtn('前进 →',cx,cy,160,52,true);
}

function drawLastBtn(){
  let cx=W/2, cy=H-55;
  drawBtn('最后 ✨',cx,cy,180,52,true);
}

// 场景名称（顶部）
function drawSceneTitle(){
  let names=['第一幕：草地','第二幕：雪山','第三幕：枫叶林',
             '第四幕：沙滩','第五幕：大江','第六幕：夕阳'];
  ctx.save();
  ctx.textAlign='left';
  ctx.font='bold 20px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillStyle='rgba(255,240,200,0.82)';
  ctx.shadowColor='rgba(0,0,0,0.5)';
  ctx.shadowBlur=8;
  ctx.fillText(names[sceneIdx],20,30);
  ctx.restore();
}

/* =====================================================
   场景过渡黑幕
   ===================================================== */
function drawTransition(){
  if(transAlpha<=0) return;
  ctx.fillStyle=`rgba(0,0,0,${transAlpha})`;
  ctx.fillRect(0,0,W,H);
}

/* =====================================================
   主循环
   ===================================================== */
let lastTime=0;
function loop(ts){
  let dt=Math.min((ts-lastTime)/1000, 0.05);
  lastTime=ts;
  globalT+=dt;

  ctx.clearRect(0,0,W,H);

  if(state==='journey'){
    // 过渡淡入
    if(transState==='out'){
      transAlpha=Math.min(1,transAlpha+dt*2.8);
      if(transAlpha>=1){
        // 切换场景
        sceneIdx=pendingScene;
        manX=130;
        manTargetX=W*0.72;
        sceneDone=false;
        elapsed=0;
        transState='in';
        playMusic(SCENES[sceneIdx]);
      }
    } else if(transState==='in'){
      transAlpha=Math.max(0,transAlpha-dt*1.8);
      if(transAlpha<=0) transState='none';
    }

    elapsed+=dt;

    // 小人移动
    if(!sceneDone && transState==='none'){
      let spd = (sceneIdx===4)?65:80;
      manX+=spd*dt;
      if(manX>=manTargetX){
        manX=manTargetX;
        sceneDone=true;
      }
    }

    // 渲染当前场景
    switch(sceneIdx){
      case 0: drawGrass (elapsed,manX); break;
      case 1: drawSnow  (elapsed,manX); break;
      case 2: drawMaple (elapsed,manX); break;
      case 3: drawBeach (elapsed,manX); break;
      case 4: drawRiver (elapsed,manX); break;
      case 5: drawSunset(elapsed,manX); break;
    }

    // 过渡黑幕
    drawTransition();

    // 顶部标题
    if(transAlpha<0.6) drawSceneTitle();

    // 按钮
    if(sceneDone && transAlpha<0.3){
      if(sceneIdx===5){
        drawLastBtn();
      } else {
        drawNextBtn();
      }
    }

  } else if(state==='birthday1'){
    updateBirthday(dt);
    // 定时发烟花
    if(Math.floor(bdayTime*2)%1===0 &&
       Math.floor((bdayTime-dt)*2)%1!==0){
      spawnFirework();
    }
    drawBirthday1();

  } else if(state==='birthday2'){
    updateBirthday(dt);
    if(Math.floor(bdayTime*2)%1===0 &&
       Math.floor((bdayTime-dt)*2)%1!==0){
      spawnFirework();
    }
    drawBirthday2();
  }

  requestAnimationFrame(loop);
}

/* =====================================================
   点击 / 触摸事件
   ===================================================== */
function getCanvasPos(clientX,clientY){
  let rect=canvas.getBoundingClientRect();
  let scaleX=W/rect.width, scaleY=H/rect.height;
  return {
    x:(clientX-rect.left)*scaleX,
    y:(clientY-rect.top)*scaleY
  };
}

function onTap(cx,cy){
  if(state==='journey'){
    if(!sceneDone || transAlpha>0.3) return;

    if(sceneIdx===5){
      // 最后按钮区域 W/2±90, H-55±26
      if(Math.abs(cx-W/2)<90 && Math.abs(cy-(H-55))<26){
        stopMusic();
        state='birthday1';
        bdayTime=0;
        initBirthday();
      }
    } else {
      // 前进按钮区域 W-80±80, H-55±26
      if(Math.abs(cx-(W-80))<80 && Math.abs(cy-(H-55))<26){
        pendingScene=sceneIdx+1;
        transState='out';
        transAlpha=0;
      }
    }
  } else if(state==='birthday1'){
    // 继续按钮 W/2±100, H*0.88±27
    if(Math.abs(cx-W/2)<100 && Math.abs(cy-H*0.88)<27){
      bdayTime=0;
      state='birthday2';
    }
  } else if(state==='birthday2'){
    // 重新开始 W/2±100, H*0.88±27
    if(Math.abs(cx-W/2)<100 && Math.abs(cy-H*0.88)<27){
      state='journey';
      sceneIdx=0;
      manX=130;
      manTargetX=W*0.72;
      sceneDone=false;
      elapsed=0;
      transAlpha=1;
      transState='in';
      playMusic(SCENES[0]);
    }
  }
}

canvas.addEventListener('click',e=>{
  let p=getCanvasPos(e.clientX,e.clientY);
  onTap(p.x,p.y);
});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  let touch=e.changedTouches[0];
  let p=getCanvasPos(touch.clientX,touch.clientY);
  onTap(p.x,p.y);
},{passive:false});

/* =====================================================
   初始化启动
   ===================================================== */
loadAudios();

// 等待用户第一次点击才播放音乐（浏览器政策）
let musicStarted=false;
function startMusicOnce(){
  if(!musicStarted){
    musicStarted=true;
    playMusic(SCENES[0]);
  }
}
canvas.addEventListener('click',startMusicOnce,{once:true});
canvas.addEventListener('touchend',startMusicOnce,{once:true});

// 启动主循环
requestAnimationFrame(ts=>{lastTime=ts; requestAnimationFrame(loop);});

</script>
